name: Docker Image CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'docker/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Docker image with Nix
        run: nix-build docker/image.nix

      - name: Load and Push Docker image
        run: |
          # Load the image (it usually has a name and tag from the nix derivation, e.g., veloq-dev:latest)
          docker load < result
          
          # Retag for GHCR
          IMAGE_ID=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          
          # Change all uppercase to lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          echo "Pushing to $IMAGE_ID"
          
          docker tag veloq-dev:latest $IMAGE_ID:latest
          docker tag veloq-dev:latest $IMAGE_ID:${{ github.sha }}
          
          docker push $IMAGE_ID:latest
          docker push $IMAGE_ID:${{ github.sha }}
