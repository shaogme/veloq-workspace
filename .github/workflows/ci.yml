name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '.zed/**'
      - 'docs/**'
      - '**.md'
      - 'docker/**'
      - '.config/**'
      - '.agent/**'
      - '.vscode/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '.zed/**'
      - 'docs/**'
      - '**.md'
      - 'docker/**'
      - '.config/**'
      - '.agent/**'
      - '.vscode/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo prlimit --pid $$ --memlock=unlimited:unlimited
          cargo xtest-linux

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: cargo xtest-windows

  loom-test:
    name: Loom Test
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-loom-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-loom-
      - name: Run Veloq Sync Loom tests
        run: cargo test --release -p veloq-sync --tests --features loom
      - name: Run Veloq Atomic Waker Loom tests
        run: cargo test --release -p veloq-atomic-waker --tests --features loom

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo xfmt

  clippy:
    name: Clippy on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - name: Run Clippy (Linux)
        if: runner.os == 'Linux'
        run: cargo xclippy

      - name: Run Clippy (Windows)
        if: runner.os == 'Windows'
        run: |
          rustup target add x86_64-pc-windows-gnu
          cargo xclippy-win

  ci-success:
    name: CI Success
    needs: [test, loom-test, fmt, clippy]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "All tests passed"
