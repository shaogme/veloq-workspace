[alias]
xtest-linux = "run --package xtest-runner -- --task test --target linux --count 20 --quiet --features compat"
xtest-windows = "run --package xtest-runner -- --task test --target windows --count 20 --quiet --features compat"
xfmt = "fmt --all"
xclippy-linux = "run --package xtest-runner -- --task clippy --target linux --quiet --features compat"
xcheck-linux = "run --package xtest-runner -- --task check --target linux --quiet --features compat"
xclippy-windows = "run --package xtest-runner -- --task clippy --target windows --quiet --features compat"
xcheck-windows = "run --package xtest-runner -- --task check --target windows --quiet --features compat"
